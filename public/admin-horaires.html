<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Administration des horaires | Coraline TABERT</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{
      --bg:#f5f2e6;
      --surface:#fffdf7;
      --text:#2f3d2f;
      --muted:#667260;
      --primary:#5a7e5a;
      --primary-dark:#476947;
      --line:#d7ddcc;
      --danger:#b84747;
      --radius:18px;
      --shadow:0 18px 40px rgba(20,44,36,.08);
      font-family:Manrope, Arial, sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#fbf8ef 0,#f5f2e6 100%);color:var(--text)}
    main{width:min(980px,calc(100% - 32px));margin:0 auto;padding:32px 0 56px}
    h1,h2,h3{font-family:Georgia,serif;color:var(--primary);margin:0}
    .hero{margin-bottom:24px}
    .hero p{max-width:68ch;color:var(--muted);line-height:1.7}
    .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
    .stack{display:grid;gap:18px}
    .auth{display:grid;gap:10px}
    .field{display:grid;gap:8px}
    .field label{font-weight:700}
    .field input,.slot input,.slot textarea{
      width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--text);font:inherit
    }
    .field small{color:var(--muted)}
    .cabinet{display:grid;gap:14px;padding:18px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.72)}
    .slot-list{display:grid;gap:12px}
    .slot{display:grid;grid-template-columns:1fr 2fr auto;gap:10px;align-items:start}
    .slot textarea{min-height:64px;resize:vertical}
    .actions{display:flex;flex-wrap:wrap;gap:12px}
    button{
      border:0;border-radius:999px;padding:12px 18px;background:var(--primary);color:#fff;font:700 14px/1 Manrope, Arial, sans-serif;cursor:pointer
    }
    button.secondary{background:#eef3e8;color:var(--primary-dark);border:1px solid var(--line)}
    button.danger{background:var(--danger)}
    .status{min-height:24px;color:var(--muted);font-weight:600}
    .status.is-error{color:var(--danger)}
    .meta{font-size:14px;color:var(--muted)}
    @media (max-width:720px){
      .slot{grid-template-columns:1fr}
      main{width:min(100% - 20px,980px);padding-top:20px}
      .panel{padding:16px}
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Modifier les horaires</h1>
      <p>Cette page permet à Caroline de mettre à jour les horaires affichés sur le site. Les changements sont enregistrés via l’API et seront visibles sur la page d’accueil.</p>
    </section>

    <section class="panel stack">
      <div class="auth">
        <div class="field">
          <label for="admin-password">Mot de passe</label>
          <input id="admin-password" type="password" autocomplete="current-password" />
          <small>Le mot de passe est nécessaire pour enregistrer les modifications.</small>
        </div>
      </div>

      <div id="schedule-editor" class="stack"></div>

      <div class="actions">
        <button id="save-button" type="button">Enregistrer les horaires</button>
      </div>

      <p id="status" class="status" aria-live="polite"></p>
      <p id="meta" class="meta"></p>
    </section>
  </main>

  <script src="assets/js/admin-hours.js" defer></script>
</body>
</html>
